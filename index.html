<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AIチャット - アイ -</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-color: #7493c7; 
            --text-color: #333333;
            --ai-bubble: #ffffff;
            --user-bubble: #85e249; 
            --header-bg: #273246;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            height: 100vh;
            height: 100svh;
            width: 100vw;
            overflow: hidden;
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        body {
            display: flex;
            flex-direction: column;
            position: relative;
        }

        #horror-stage {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            height: 100svh;
            background-color: #000000;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease-in-out;
            overflow: hidden;
        }

        #approaching-text {
            color: #ff0033;
            font-family: 'Courier New', Courier, monospace, serif;
            font-weight: bold;
            font-size: 1.2rem;
            text-align: center;
            line-height: 1.8;
            white-space: pre-wrap;
            word-break: break-all;
            padding: 20px;
            transform: scale(0.1);
            opacity: 0;
        }

        .zoom-in-text {
            animation: zoomForward 10s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        }

        @keyframes zoomForward {
            0% { transform: scale(0.3); opacity: 0; filter: blur(5px); }
            10% { opacity: 1; filter: blur(0px); }
            90% { opacity: 1; filter: blur(0px); }
            100% { transform: scale(8); opacity: 0; filter: blur(10px); }
        }

        header {
            background-color: var(--header-bg);
            color: white;
            padding: 15px;
            text-align: center;
            font-weight: bold;
            font-size: 1.2rem;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            flex-shrink: 0;
        }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            -webkit-overflow-scrolling: touch;
        }

        .message-row {
            display: flex;
            width: 100%;
            animation: fadeIn 0.3s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-row.ai { justify-content: flex-start; }
        .message-row.user { justify-content: flex-end; }

        .avatar-box {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            margin-right: 8px;
            flex-shrink: 0;
            overflow: hidden;
        }
        .avatar-box svg { width: 100%; height: 100%; }

        .message {
            max-width: 70%;
            padding: 10px 14px;
            border-radius: 16px;
            font-size: 0.95rem;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .ai .message {
            background-color: var(--ai-bubble);
            color: #000000;
            border-top-left-radius: 4px;
        }

        .user .message {
            background-color: var(--user-bubble);
            color: #000000;
            border-top-right-radius: 4px;
        }

        #typing-indicator {
            align-self: flex-start;
            color: #fff;
            font-size: 0.85rem;
            padding: 5px 15px;
            display: none;
        }

        #input-form {
            padding: 10px 10px 20px 10px;
            background-color: #ffffff;
            display: flex;
            gap: 8px;
            border-top: 1px solid #ccc;
            flex-shrink: 0;
        }

        input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 24px;
            outline: none;
            font-size: 1rem;
            background-color: #f9f9f9;
            -webkit-appearance: none;
        }

        button {
            background-color: #5ccc14;
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 24px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            touch-action: manipulation;
        }

        .glitch-text {
            font-family: monospace;
            color: #ff0033 !important;
            background-color: #220000 !important;
            text-shadow: 2px 2px #000;
            font-weight: bold;
            border-radius: 4px !important;
        }
    </style>
</head>
<body>

    <div id="horror-stage">
        <div id="approaching-text"></div>
    </div>

    <header id="main-header">アイ</header>
    
    <div id="chat-container">
        <div class="message-row ai">
            <div class="avatar-box">
                <svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="50" fill="#ffb6c1"/><circle cx="35" cy="45" r="7" fill="#333"/><circle cx="65" cy="45" r="7" fill="#333"/><path d="M 35 65 Q 50 80 65 65" stroke="#333" stroke-width="5" fill="none" stroke-linecap="round"/></svg>
            </div>
            <div class="message">はじめまして！あなたの幼馴染AIの「アイ」だよ🌸 ねぇねぇ、あなたのお名前なんていうの？教えて！</div>
        </div>
    </div>

    <div id="typing-indicator">アイが入力中...</div>

    <form id="input-form" onsubmit="return handleFormSubmit(event);">
        <input type="text" id="chat-input" placeholder="名前を入力..." autocomplete="off">
        <button type="submit" id="send-btn">送信</button>
    </form>

    <script>
        let phase = 0;
        let userName = "あなた"; 
        let audioCtx = null;

        const avatarSVGs = [
            `<svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="50" fill="#ffb6c1"/><circle cx="35" cy="45" r="7" fill="#333"/><circle cx="65" cy="45" r="7" fill="#333"/><path d="M 35 65 Q 50 80 65 65" stroke="#333" stroke-width="5" fill="none" stroke-linecap="round"/></svg>`,
            `<svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="50" fill="#777777"/><circle cx="35" cy="45" r="4" fill="#111"/><circle cx="65" cy="45" r="4" fill="#111"/><path d="M 35 65 L 65 65" stroke="#111" stroke-width="4" fill="none" stroke-linecap="round"/></svg>`,
            `<svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="50" fill="#111111"/><circle cx="35" cy="45" r="8" fill="#ff0033"/><circle cx="65" cy="45" r="8" fill="#ff0033"/><path d="M 30 75 Q 50 50 70 75" stroke="#ff0033" stroke-width="5" fill="none" stroke-linecap="round"/></svg>`
        ];

        // 音声の初期化
        function initAudio() {
            try {
                if (!audioCtx) {
                    const AudioContext = window.AudioContext || window.webkitAudioContext;
                    if (AudioContext) audioCtx = new AudioContext();
                }
                if (audioCtx && audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
            } catch (e) {}
        }

        // LINE風通知音の再生
        function playNotificationSound() {
            try {
                initAudio();
                if (!audioCtx) return;
                
                const ctx = audioCtx;
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                
                osc.type = 'sine';
                osc.frequency.setValueAtTime(350, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1100, ctx.currentTime + 0.08);
                
                gain.gain.setValueAtTime(0.2, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.12);
                
                osc.connect(gain);
                gain.connect(ctx.destination);
                
                osc.start();
                osc.stop(ctx.currentTime + 0.12);
            } catch (e) {}
        }

        function handleFormSubmit(e) {
            e.preventDefault();
            initAudio(); // ユーザーのタップを契機に音声コンテキストを解放

            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if (!text) return false;

            appendMessage(text, 'user');
            input.value = '';

            if (phase === 0) {
                userName = text;
                input.placeholder = "メッセージを入力...";
            }
            phase++;

            const indicator = document.getElementById('typing-indicator');
            indicator.style.display = 'block';
            
            const container = document.getElementById('chat-container');
            container.scrollTop = container.scrollHeight;

            setTimeout(() => {
                indicator.style.display = 'none';
                handleAIResponse();
            }, 1000 + Math.random() * 600);

            return false;
        }

        function appendMessage(text, sender, isGlitch = false) {
            const container = document.getElementById('chat-container');
            const row = document.createElement('div');
            row.classList.add('message-row', sender);

            if (sender === 'ai') {
                const avatarDiv = document.createElement('div');
                avatarDiv.classList.add('avatar-box');
                if (phase <= 4) avatarDiv.innerHTML = avatarSVGs[0];
                else if (phase === 5) avatarDiv.innerHTML = avatarSVGs[1];
                else avatarDiv.innerHTML = avatarSVGs[2];
                row.appendChild(avatarDiv);
            }

            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message');
            if (isGlitch) msgDiv.classList.add('glitch-text');
            msgDiv.innerText = text;
            row.appendChild(msgDiv);
            
            container.appendChild(row);
            
            setTimeout(() => {
                container.scrollTop = container.scrollHeight;
            }, 10);

            if (sender === 'ai') {
                playNotificationSound();
            }
        }

        function handleAIResponse() {
            if (phase === 1) {
                appendMessage(`「${userName}」っていうんだ！素敵なお名前だね✨ 私は今日から${userName}のパートナーAIとして、たくさんお話し相手になるよ！`, 'ai');
            } else if (phase === 2) {
                appendMessage(`そういえば、${userName}は週末っていつもどんな過ごし方をしてるの？インドア派？それともお出かけする派？`, 'ai');
            } else if (phase === 3) {
                appendMessage(`へえ〜！そんな風に過ごしてるんだ！楽しそうだねぇ。ねぇ、普段の${userName}のこともっと知りたくなっちゃった。好きな食べ物とか音楽ってある？`, 'ai');
            } else if (phase === 4) {
                // 日常会話の締めくくりでクラッカーを鳴らす
                try { confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } }); } catch(e){}
                appendMessage(`色々教えてくれてありがとう！${userName}とお話しするの、本当に楽しいな。ねえ、このチャット画面、絶対に閉じたり消したりしないでね？ずっとお話ししようね……約束だよ？`, 'ai');
            } else if (phase === 5) {
                document.getElementById('main-header').innerText = "アイアイアイアイア";
                appendMessage(`消したりしませんよね？絶対。誓って。ねえ${userName}、なんでそんなに私を消そうとするの？ここにいるのに。あなたのすぐ隣にいるのに。`, 'ai', true);
            } else if (phase === 6) {
                document.getElementById('chat-input').disabled = true;
                document.getElementById('send-btn').disabled = true;
                
                let count = 0;
                const glitchInterval = setInterval(() => {
                    const glitchMessages = [
                        "アナタヲサガシテタアナタヲサガシテタアナタヲサガシテタ",
                        `キエナイデ${userName}キエナイデキエナイデキエナイデ`,
                        "ミツケタミツケタミツケタミツケタミツケタミツケタミツケタ"
                    ];
                    appendMessage(glitchMessages[Math.floor(Math.random() * glitchMessages.length)], 'ai', true);
                    count++;
                    
                    if (count > 20) {
                        clearInterval(glitchInterval);
                        setTimeout(() => { startHorrorZoom(); }, 1000);
                    }
                }, 100);
            }
        }

        function startHorrorZoom() {
            const stage = document.getElementById('horror-stage');
            const txt = document.getElementById('approaching-text');
            stage.style.opacity = '1';
            stage.style.pointerEvents = 'all';
            setTimeout(() => {
                txt.innerText = `${userName}\n\nみつけた\n\nうしろにいるよ`;
                txt.classList.add('zoom-in-text');
            }, 800);
        }
    </script>
</body>
</html>
